services:
  - type: web
    name: studwork-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/orders
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      # Free tier без диска: SQLite в /tmp (данные сбрасываются при редеплое — ок для демо)
      - key: ConnectionStrings__DefaultConnection
        value: Data Source=/tmp/studwork.db
      - key: Cors__Origins
        value: https://STYOP2122.github.io,http://localhost:5173
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: StudworkApi
      - key: Jwt__Audience
        value: StudworkApp
